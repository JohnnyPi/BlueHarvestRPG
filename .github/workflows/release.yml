name: Release builds

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  test:
    name: Test release
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore local tools
        run: dotnet tool restore

      - name: Run tests
        run: dotnet test Rouge.slnx --configuration Release

  windows:
    name: Build Windows x64
    needs: test
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore local tools
        run: dotnet tool restore

      - name: Publish
        shell: pwsh
        run: ./scripts/publish-windows.ps1

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path artifacts/windows-x64/Game.Client `
            -DestinationPath "Rouge-${{ github.ref_name }}-windows-x64.zip"

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: Rouge-${{ github.ref_name }}-windows-x64.zip
          if-no-files-found: error

  macos:
    name: Build macOS Apple Silicon
    needs: test
    runs-on: macos-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore local tools
        run: dotnet tool restore

      - name: Publish
        run: bash scripts/publish-macos.sh

      - name: Package
        run: |
          chmod +x artifacts/macos-arm64/Game.Client/Game.Client
          ditto -c -k --sequesterRsrc --keepParent \
            artifacts/macos-arm64/Game.Client \
            "Rouge-${{ github.ref_name }}-macos-arm64.zip"

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: Rouge-${{ github.ref_name }}-macos-arm64.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs:
      - windows
      - macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download builds
        uses: actions/download-artifact@v4
        with:
          pattern: "*-x64"
          path: release-assets
          merge-multiple: true

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: release-assets

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/*.zip \
            --verify-tag \
            --prerelease \
            --generate-notes \
            --title "Rouge $GITHUB_REF_NAME"
